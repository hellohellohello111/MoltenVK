name: Build MoltenVK v1.4.1 with Format Fallback
on:
  push:
    branches: [format-fallback-v1.4.1]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Fetch dependencies
      run: ./fetchDependencies --macos

    - name: Build MoltenVK with private API
      run: |
        make macos MVK_CONFIG_LOG_LEVEL=1 MVK_HIDE_VULKAN_SYMBOLS=0 MVK_USE_METAL_PRIVATE_API=1
        ls -la Package/Latest/MoltenVK/dynamic/dylib/macOS/libMoltenVK.dylib
        nm -g Package/Latest/MoltenVK/dynamic/dylib/macOS/libMoltenVK.dylib | grep "mvkMTLLogicOperation\|mvkMTLProvokingVertex"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MoltenVK-v141-format-fallback
        path: Package/Latest/MoltenVK/dynamic/dylib/macOS/libMoltenVK.dylib
