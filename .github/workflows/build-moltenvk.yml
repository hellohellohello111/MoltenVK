name: Build MoltenVK with Pipeline Format Fallback
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Fetch dependencies
      run: ./fetchDependencies --macos

    - name: Build MoltenVK
      run: |
        make macos
        ls -la Package/Latest/MoltenVK/dynamic/dylib/macOS/libMoltenVK.dylib

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MoltenVK-format-fallback
        path: Package/Latest/MoltenVK/dynamic/dylib/macOS/libMoltenVK.dylib
